<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <rect width="64" height="64" rx="14" fill="#FCE7F3"/>
  <!-- Ears -->
  <rect x="16" y="6"  width="9"  height="22" fill="#FFFFFF" stroke="#F472B6" stroke-width="1.5"/>
  <rect x="39" y="6"  width="9"  height="22" fill="#FFFFFF" stroke="#F472B6" stroke-width="1.5"/>
  <rect x="18" y="10" width="5"  height="14" fill="#FBCFE8"/>
  <rect x="41" y="10" width="5"  height="14" fill="#FBCFE8"/>
  <!-- Head -->
  <rect x="10" y="22" width="44" height="30" fill="#FFFFFF" stroke="#F472B6" stroke-width="1.5"/>
  <!-- Cheeks -->
  <rect x="14" y="36" width="6" height="3" fill="#F9A8D4"/>
  <rect x="44" y="36" width="6" height="3" fill="#F9A8D4"/>
  <!-- Eyes -->
  <rect x="20" y="30" width="4" height="4" fill="#2A1E22"/>
  <rect x="40" y="30" width="4" height="4" fill="#2A1E22"/>
  <rect x="21" y="30" width="2" height="2" fill="#FFFFFF"/>
  <rect x="41" y="30" width="2" height="2" fill="#FFFFFF"/>
  <!-- Mouth -->
  <rect x="30" y="40" width="4" height="2" fill="#EC4899"/>
  <rect x="31" y="42" width="2" height="1" fill="#EC4899"/>
</svg>
